# ──────────────────────────────────────────────
# reBorn_i — Docker Compose
# Full stack: API + PostgreSQL + Redis
# ──────────────────────────────────────────────
version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────
  db:
    image: postgres:16-alpine
    container_name: reborn_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: reborn
      POSTGRES_PASSWORD: reborn_secure_pass
      POSTGRES_DB: reborn_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reborn -d reborn_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: reborn_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── reBorn_i API ─────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: reborn_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://reborn:${DB_PASSWORD:-reborn_secure_pass}@db:5432/reborn_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change_this_in_production_min16}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../data:/app/data

volumes:
  postgres_data:
  redis_data:
