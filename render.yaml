services:
  - type: web
    name: reborni-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install --no-cache-dir -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: reborni-postgres
          property: connectionString

databases:
  - name: reborni-postgres
    region: oregon
    plan: free
    databaseName: reborni_db
